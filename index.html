<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
        }

        body {
            /* Deep midnight gradient */
            background: radial-gradient(circle at top right, #1e3c72, #111);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: white;
        }

        /* Container for the cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card-link {
            text-decoration: none;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated border glow on hover */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 2px; 
            background: linear-gradient(45deg, transparent, var(--accent-color), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .glass-card:hover .icon-box {
            transform: rotate(-10deg) scale(1.1);
        }

        .icon-box i {
            font-size: 2rem;
            color: white;
        }

        .card-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-text {
            color: #aaa;
            font-size: 0.85rem;
            margin: 0;
        }

        /* Floating Animation */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-anim {
            animation: floating 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row g-4 justify-content-center">
            
            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/NutriGraph/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #ff6b6b, #ee0979);">
                            <i class="bi bi-apple"></i>
                        </div>
                        <h5 class="card-title">Calories</h5>
                        <p class="card-text">NutriGraph Tracker</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/ModelY/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);">
                            <i class="bi bi-car-front-fill"></i>
                        </div>
                        <h5 class="card-title">Model Y</h5>
                        <p class="card-text">Tesla Analytics</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/Model3/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #373B44, #4286f4);">
                            <i class="bi bi-lightning-charge-fill"></i>
                        </div>
                        <h5 class="card-title">Model 3</h5>
                        <p class="card-text">Performance Data</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/fiscal-flow-ledger/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                            <i class="bi bi-wallet2"></i>
                        </div>
                        <h5 class="card-title">Budget</h5>
                        <p class="card-text">Fiscal Flow Ledger</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/CareerArc-Firebase/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #f12711, #f5af19);">
                            <i class="bi bi-briefcase"></i>
                        </div>
                        <h5 class="card-title">Job Tracker</h5>
                        <p class="card-text">Career Arc Arc</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/net-proceeds-analytics/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #8E2DE2, #4A00E0);">
                            <i class="bi bi-cash-stack"></i>
                        </div>
                        <h5 class="card-title">Proceeds</h5>
                        <p class="card-text">Net Analytics</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/my-portfolio/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #DA22FF, #9733EE);">
                            <i class="bi bi-person-badge"></i>
                        </div>
                        <h5 class="card-title">Portfolio</h5>
                        <p class="card-text">My Creative Work</p>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
