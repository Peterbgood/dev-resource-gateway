<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: #0d0e12;
            background-image: 
                radial-gradient(at 0% 0%, rgba(63, 94, 251, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(252, 70, 107, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
        }

        /* Entrance Animation for the whole row */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .card-link {
            text-decoration: none !important;
            display: block;
            height: 100%;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            /* Smoother transition - removed the "cubic-bezier" that causes jitter */
            transition: all 0.3s ease-out;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Hover State - Focused on lighting rather than big jumps */
        .card-link:hover .glass-card {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px); /* Very subtle lift */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.6rem;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .card-link:hover .icon-box {
            transform: scale(1.05); /* Just a tiny pulse */
        }

        .card-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 6px;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .card-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        /* Sophisticated subtle light sweep */
        .glass-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .card-link:hover .glass-card::after {
            left: 120%;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row g-4 justify-content-center">
            
            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/NutriGraph/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #ff5f6d, #ffc371);">
                            <i class="bi bi-apple"></i>
                        </div>
                        <h5 class="card-title">Calories</h5>
                        <p class="card-text">Health</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/ModelY/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);">
                            <i class="bi bi-car-front-fill"></i>
                        </div>
                        <h5 class="card-title">Model Y</h5>
                        <p class="card-text">Tesla</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/Model3/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #4b6cb7, #182848);">
                            <i class="bi bi-lightning-charge"></i>
                        </div>
                        <h5 class="card-title">Model 3</h5>
                        <p class="card-text">Performance</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/fiscal-flow-ledger/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                            <i class="bi bi-wallet2"></i>
                        </div>
                        <h5 class="card-title">Budget</h5>
                        <p class="card-text">Finance</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/CareerArc-Firebase/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #ee0979, #ff6a00);">
                            <i class="bi bi-briefcase"></i>
                        </div>
                        <h5 class="card-title">Job Tracker</h5>
                        <p class="card-text">Career</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/net-proceeds-analytics/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #8e2de2, #4a00e0);">
                            <i class="bi bi-cash-stack"></i>
                        </div>
                        <h5 class="card-title">Proceeds</h5>
                        <p class="card-text">Net Worth</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <a href="https://peterbgood.github.io/my-portfolio/" class="card-link">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #da22ff, #9733ee);">
                            <i class="bi bi-person-badge"></i>
                        </div>
                        <h5 class="card-title">Portfolio</h5>
                        <p class="card-text">Creative</p>
                    </div>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
