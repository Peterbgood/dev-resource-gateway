<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
        }

        body {
            background-color: #0a0a0b;
            /* Animated Mesh Gradient */
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 60, 114, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 172, 254, 0.2) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
        }

        .card-link {
            text-decoration: none;
            display: block;
            opacity: 0; /* For entrance animation */
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards ease-out;
        }

        /* Staggered animation delay for cards */
        .card-link:nth-child(1) { animation-delay: 0.1s; }
        .card-link:nth-child(2) { animation-delay: 0.2s; }
        .card-link:nth-child(3) { animation-delay: 0.3s; }
        .card-link:nth-child(4) { animation-delay: 0.4s; }
        .card-link:nth-child(5) { animation-delay: 0.5s; }
        .card-link:nth-child(6) { animation-delay: 0.6s; }
        .card-link:nth-child(7) { animation-delay: 0.7s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            height: 100%;
            position: relative;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            position: relative;
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .glass-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        /* Glow effect behind icons */
        .icon-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            filter: blur(15px);
            opacity: 0.4;
            z-index: -1;
            background: inherit;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #fff;
        }

        .card-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Subtle reflection effect on the card */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .glass-card:hover::before {
            left: 150%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row g-4 justify-content-center">
            
            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/NutriGraph/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #FF5F6D, #FFC371);">
                            <i class="bi bi-apple"></i>
                        </div>
                        <h5 class="card-title">Calories</h5>
                        <p class="card-text">NutriGraph</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/ModelY/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);">
                            <i class="bi bi-car-front-fill"></i>
                        </div>
                        <h5 class="card-title">Model Y</h5>
                        <p class="card-text">Tesla Ops</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/Model3/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
                            <i class="bi bi-lightning-charge"></i>
                        </div>
                        <h5 class="card-title">Model 3</h5>
                        <p class="card-text">Performance</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/fiscal-flow-ledger/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                            <i class="bi bi-wallet2"></i>
                        </div>
                        <h5 class="card-title">Budget</h5>
                        <p class="card-text">Fiscal Flow</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/CareerArc-Firebase/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #fc4a1a, #f7b733);">
                            <i class="bi bi-briefcase"></i>
                        </div>
                        <h5 class="card-title">Job Tracker</h5>
                        <p class="card-text">Career Arc</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/net-proceeds-analytics/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #8E2DE2, #4A00E0);">
                            <i class="bi bi-cash-stack"></i>
                        </div>
                        <h5 class="card-title">Proceeds</h5>
                        <p class="card-text">Net Analytics</p>
                    </div>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-3 card-link">
                <a href="https://peterbgood.github.io/my-portfolio/" style="text-decoration: none;">
                    <div class="glass-card">
                        <div class="icon-box" style="background: linear-gradient(135deg, #DA22FF, #9733EE);">
                            <i class="bi bi-person-badge"></i>
                        </div>
                        <h5 class="card-title">Portfolio</h5>
                        <p class="card-text">Creative</p>
                    </div>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
